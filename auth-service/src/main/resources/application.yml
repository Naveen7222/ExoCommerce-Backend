server:
  port: ${PORT:8085}

spring:
  application:
    name: auth-service

  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    database-platform: org.hibernate.dialect.MySQL8Dialect
    show-sql: true
    hibernate:
      ddl-auto: update

  main:
    allow-bean-definition-overriding: true

eureka:
  client:
    register-with-eureka: true
    fetch-registry: true
    service-url:
      defaultZone: https://exocommerce-backend.onrender.com/eureka

  instance:
    hostname: auth-service-ueyq.onrender.com
    secure-port: 443
    secure-port-enabled: true
    non-secure-port-enabled: false
    status-page-url: https://auth-service-ueyq.onrender.com/actuator/info
    health-check-url: https://auth-service-ueyq.onrender.com/actuator/health
    home-page-url: https://auth-service-ueyq.onrender.com
    secure-virtual-host-name: auth-service

jwt:
  secret: ${JWT_SECRET}
  expiration: 3600000