server:
  port: ${PORT:8085}

spring:
  application:
    name: auth-service

  autoconfigure:
    exclude:
      - org.springframework.boot.autoconfigure.jdbc.DataSourceAutoConfiguration

  main:
    allow-bean-definition-overriding: true

#  datasource:
#  jpa:

eureka:
  client:
    register-with-eureka: true
    fetch-registry: true
    service-url:
      defaultZone: https://exocommerce-backend.onrender.com/eureka/

jwt:
  secret: ${JWT_SECRET}
  expiration: 3600000