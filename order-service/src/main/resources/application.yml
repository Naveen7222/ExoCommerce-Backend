server:
  port: 8083

spring:
  application:
    name: order-service

  security:
    oauth2:
      resourceserver:
        jwt:
          secret-key: EXO_SECRET_KEY_123_EXO_SECRET_KEY_123

  datasource:
    url: jdbc:mysql://localhost:3306/orders_db
    username: exo_user
    password: root123
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQL8Dialect

eureka:
  client:
    register-with-eureka: true
    fetch-registry: true
    service-url:
      defaultZone: http://localhost:8761/eureka/
